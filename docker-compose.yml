services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: vpn-wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/Rome}
      - SERVERURL=${SERVERURL:-sseapid.isti.cnr.it}
      - SERVERPORT=${SERVERPORT:-51820}
      - PEERS=${PEERS:-android1}
      - PEERDNS=${PEERDNS:-10.8.0.1}
      - INTERNAL_SUBNET=${INTERNAL_SUBNET:-10.8.0.0}
      - ALLOWEDIPS=${ALLOWEDIPS:-0.0.0.0/0,::/0}
      - LOG_CONFS=false
    volumes:
      - ./wireguard/config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "${SERVERPORT:-51820}:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    restart: unless-stopped
